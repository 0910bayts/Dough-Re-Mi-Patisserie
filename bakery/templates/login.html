{% extends 'base.html' %}
{% load static %}

{% block title %}Dough Re Mi Patisserie - Log in{% endblock %}

{% block content %}
    <section>
        <div class="registration">
            <h1>Log in</h1>
            <p>New user? <a href="{% url 'signup' %}">Sign up</a> instead</p>

            <form id="login" method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <label for="email"><h4>Email:</h4></label>
                <input type="email" name="email" id="email" required>
                <br><br><br>
                <label for="password"><h4>Password:</h4></label>
                <input type="password" name="password" id="password" required>
                <button type="submit" name="login" id="submit"><h3>Log in</h3></button>
            </form>

            <!-- Google OAuth Login Button -->
            <div class="social-login" style="margin-top: 30px;">
                <a href="/accounts/google/login/" class="btn btn-outline-dark w-100" style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 20px; height: 20px;">
                    <span>Continue with Google</span>
                </a>
            </div>
        </div>
    </section>
{% endblock %}
