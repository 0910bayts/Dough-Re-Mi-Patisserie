{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Up{% endblock %}

{% block content %}
    <section>
    <div class="registration">
        <h1>Sign Up</h1>
        <p>Already have an account? <a href="{% url 'login' %}">Log in</a> instead</p>

        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        <form id="signup" action="{% url 'signup' %}" method="POST">
            {% csrf_token %}
            <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
                <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                    <label for="Fname" style="width: 150px; text-align: right;"><h4>First Name:</h4></label>
                    <input type="text" name="first_name" id="Fname" required style="flex: 1;">
                </div>
                <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                    <label for="Lname" style="width: 150px; text-align: right;"><h4>Last Name:</h4></label>
                    <input type="text" name="last_name" id="Lname" required style="flex: 1;">
                </div>
                <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                    <label for="number" style="width: 150px; text-align: right;"><h4>Phone Number:</h4></label>
                    <input type="number" name="contactnumber" id="number" maxlength="11" title="Please enter exactly 11 digits." required style="flex: 1;">
                </div>
                <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                    <label for="email" style="width: 150px; text-align: right;"><h4>Email Address:</h4></label>
                    <input type="email" name="email" id="email" required style="flex: 1;">
                </div>
                <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                    <label for="pass" style="width: 150px; text-align: right;"><h4>Password:</h4></label>
                    <input type="password" name="password" id="pass" required style="flex: 1;">
                </div>
                <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                    <label for="pass2" style="width: 150px; text-align: right;"><h4>Confirm Password:</h4></label>
                    <input type="password" name="confirm_password" id="pass2" required style="flex: 1;">
                </div>
            </div>
            
            <button type="submit" name="register" id="submit"><h3>Sign Up</h3></button>
        </form>

        <!-- Google OAuth Signup Button -->
        <div class="social-login" style="margin-top: 30px;">
            <a href="/accounts/google/login/" class="btn btn-outline-dark w-100" style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 20px; height: 20px;">
                <span>Sign up with Google</span>
            </a>
        </div>
    </div>
    </section>
{% endblock %}
